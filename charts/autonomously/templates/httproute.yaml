{{- range $name, $comp := .Values.components }}
{{- if and (default true $comp.enabled) $comp.gateway }}
{{- if $comp.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "autonomously.componentName" (dict "root" $ "name" $name) }}
  labels:
    {{- include "autonomously.componentLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  parentRefs:
    - name: {{ if $comp.gateway.parentRef }}{{ default "a10y-gateway" $comp.gateway.parentRef.name }}{{ else }}a10y-gateway{{ end }}
      {{- if $comp.gateway.parentRef }}
      {{- if $comp.gateway.parentRef.namespace }}
      namespace: {{ $comp.gateway.parentRef.namespace }}
      {{- end }}
      {{- if $comp.gateway.parentRef.sectionName }}
      sectionName: {{ $comp.gateway.parentRef.sectionName }}
      {{- end }}
      {{- end }}
  hostnames:
    - {{ $comp.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ default "/" $comp.gateway.pathPrefix }}
      backendRefs:
        - name: {{ include "autonomously.componentName" (dict "root" $ "name" $name) }}
          port: {{ (index $comp.ports 0).port }}
{{- end }}
{{- end }}
{{- end }}
